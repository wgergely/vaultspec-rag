repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Lint and fix Python code (Ruff)
        entry: ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: Format Python code (Ruff)
        entry: ruff format
        language: system
        types: [python]
        pass_filenames: true

      - id: taplo-format
        name: Format TOML files (Taplo)
        entry: npx @taplo/cli fmt
        language: system
        types: [toml]
        pass_filenames: true

      - id: taplo-lint
        name: Lint TOML files (Taplo)
        entry: npx @taplo/cli lint
        language: system
        types: [toml]
        pass_filenames: true

      - id: ty
        name: Type-check Python codebase (Ty)
        entry: uv run python -m ty check src/vaultspec_rag
        language: system
        types: [python]
        pass_filenames: false

      - id: markdownlint
        name: Lint Markdown style (markdownlint)
        entry: npx --yes markdownlint-cli
        language: system
        args: ["--config", ".markdownlint.json", "--fix", "test-project/.vault/", "README.md"]
        types: [markdown]
