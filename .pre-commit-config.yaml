repos:
- repo: local
  hooks:
  - id: ruff-check
    name: Lint Python code (Ruff)
    entry: uv run --no-sync ruff check
    language: system
    types:
    - python
    pass_filenames: true
  - id: ruff-format-check
    name: Check Python formatting (Ruff)
    entry: uv run --no-sync ruff format --check
    language: system
    types:
    - python
    pass_filenames: true
  - id: taplo-lint
    name: Lint TOML files (Taplo)
    entry: taplo lint
    language: system
    types:
    - toml
    pass_filenames: true
  - id: ty
    name: Type-check Python codebase (Ty)
    entry: uv run --no-sync python -m ty check src/vaultspec_rag
    language: system
    types:
    - python
    pass_filenames: false
  - id: mdformat-check
    name: Check Markdown formatting (mdformat)
    entry: uv run --no-sync mdformat --check
    language: system
    pass_filenames: true
    types:
    - markdown
    exclude: ^test-project/
  - id: pymarkdown
    name: Lint Markdown style (pymarkdown)
    entry: uv run --no-sync pymarkdown --config .pymarkdown.json scan
    language: system
    pass_filenames: true
    types:
    - markdown
    exclude: ^test-project/
  - id: vault-fix
    name: Vault Doctor
    entry: uv run --no-sync vaultspec-core vault check all --fix
    language: system
    types:
    - markdown
    pass_filenames: false
  - id: check-provider-artifacts
    name: Check provider artifacts
    entry: uv run --no-sync vaultspec-core check-providers
    always_run: true
    language: system
    pass_filenames: false
  - id: spec-check
    name: Spec check
    entry: uv run --no-sync vaultspec-core spec doctor
    types:
    - markdown
    language: system
    pass_filenames: false
