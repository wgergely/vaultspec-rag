# Example hook: auto-verify vault after document creation.
#
# This hook runs `vaultspec-core vault audit --verify` whenever a new document
# is created via `vaultspec-core vault create`.
#
# To activate: set `enabled: true` below.
#
# Supported events:
#   vault.document.created    - after `vaultspec-core vault create`
#   config.synced             - after config sync operations
#   audit.completed           - after `vaultspec-core vault audit`
#
# Action types:
#   shell   - run a shell command (60s timeout, no shell=True)
#
# Context variables (usable as {placeholders} in command strings):
#   {path}    - path to the affected document (set by --path on manual runs,
#               or by the lifecycle trigger for vault.document.created)
#   {root}    - workspace root directory
#   {event}   - the event name that fired this hook

event: vault.document.created
enabled: false  # set to true to activate
actions:
  - type: shell
    command: "vaultspec-core vault audit --verify"
