# Intent-tagged labeled query set for vault search ranking evaluation.
#
# Each [[query]] carries a natural-language query, a declared intent
# (orientation | debugging | implementation), and a list of gold judgments.
# Each gold judgment is a vault doc_id (path without extension, relative to the
# docs dir, e.g. "adr/2026-06-12-service-concurrency-adr") and a graded
# relevance in [0, 3].
#
# Grades are assigned MECHANICALLY from tests/quality/rubric.py applied to each
# document's (intent, doc_type, status) - never read off a retriever's output.
# Documents not listed for a query are implicitly grade 0. Intent is authored,
# never inferred. The set targets the real project vault so the gating harness
# runs against the actual corpus the live failure lives in.
#
# Statuses recorded inline as comments are the documents' true H1 status at
# authoring time; if a document is later superseded, regenerate its grade.

# --- Orientation: the authoritative, active decision should lead. ------------

