name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NO_COLOR: "1"
  FORCE_COLOR: "0"

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint GitHub Actions workflows
        uses: docker://rhysd/actionlint:1.7.11

  lint-and-type:
    name: Lint, Type, Config, Link, and Markdown Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install lychee
        uses: taiki-e/install-action@v2
        with:
          tool: lychee

      - name: Install taplo
        uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install dependencies
        run: just dev deps sync

      - name: Ruff
        run: just dev lint python

      - name: Ty
        run: just dev lint type

      - name: Taplo
        run: just dev lint toml

      - name: Lychee
        run: just dev lint links

      - name: Markdown
        run: just dev lint markdown

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install dependencies
        run: just dev deps sync

      - name: Run tests
        run: just dev test python

  vault-audit:
    name: Vault Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install dependencies
        run: just dev deps sync

      - name: Verify vault structure and links
        run: uv run vaultspec-core vault check all

  dependency-audit:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install dependencies
        run: just dev deps sync

      - name: Python dependency vulnerability audit
        run: just dev audit deps
