name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NO_COLOR: "1"
  FORCE_COLOR: "0"

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Lint GitHub Actions workflows
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint

  lint-and-type:
    name: Lint, Type, Config, Link, and Markdown Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install lychee
        uses: taiki-e/install-action@v2
        with:
          tool: lychee

      - name: Install taplo
        uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install dependencies
        run: just dev deps sync

      - name: Ruff
        run: just dev lint python

      - name: Ty
        run: just dev lint type

      - name: Taplo
        run: just dev lint toml

      - name: Lychee
        run: just dev lint links

      - name: Markdown
        run: just dev lint markdown

      # Baseline-calibrated gate: thresholds sit at today's worst offender
      # (cognitive<=20, xenon absolute/modules<=C, average<=A) so this stays
      # green until the remediation campaign ratchets them down.
      - name: Complexity gate
        run: just dev lint complexity

      # Report-only signal (always exit 0): module LOC is baseline data for a
      # future ratchet, not a gate.
      - name: Module length (report-only)
        run: just dev lint module-length

      # Gating: basedpyright strict reached zero on 2026-06-10, so this now
      # fails CI on any new strict-type error.
      - name: Strict types
        run: just dev lint type-strict

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install dependencies
        run: just dev deps sync

      - name: Run tests
        run: just dev test python

  vault-audit:
    name: Vault Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install dependencies
        run: just dev deps sync

      - name: Verify vault structure and links
        run: uv run vaultspec-core vault check all

  dependency-audit:
    name: Dependency Audit (uv audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install dependencies
        run: just dev deps sync

      - name: Python dependency vulnerability audit
        run: just dev audit deps
