name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Update uv.lock on release branch
        if: steps.release.outputs.pr && !steps.release.outputs.release_created
        uses: actions/checkout@v4
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}

      - name: Regenerate lockfile
        if: steps.release.outputs.pr && !steps.release.outputs.release_created
        uses: astral-sh/setup-uv@v7

      - name: Push updated lockfile
        if: steps.release.outputs.pr && !steps.release.outputs.release_created
        run: |
          uv lock
          if git diff --quiet uv.lock; then
            echo "uv.lock is already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add uv.lock
            git commit -m "chore: update uv.lock for release"
            git push
          fi

      - name: Trigger Publish workflow
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run Publish \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            --field tag="${{ steps.release.outputs.tag_name }}"
