name: GPU Integration

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/gpu-integration.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "src/vaultspec_rag/**"
      - "conftest.py"

permissions:
  contents: read

concurrency:
  group: gpu-integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  NO_COLOR: "1"
  FORCE_COLOR: "0"

jobs:
  integration:
    name: Integration Tests
    runs-on: [self-hosted, gpu]
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Verify CUDA
        run: uv run python -c "import torch; assert torch.cuda.is_available(); print(torch.cuda.get_device_name(0))"

      - name: Run integration tests
        run: uv run pytest -m "integration and not subprocess_gpu" -q

  subprocess-gpu:
    name: Subprocess GPU Tests
    runs-on: [self-hosted, gpu]
    needs: integration
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Verify CUDA
        run: uv run python -c "import torch; assert torch.cuda.is_available(); print(torch.cuda.get_device_name(0))"

      - name: Run subprocess GPU tests
        run: uv run pytest -m subprocess_gpu -q
