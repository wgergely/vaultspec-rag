[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[project]
name = "vaultspec-rag"
version = "0.1.1"
description = "RAG module for vaultspec (ML-heavy extraction)"
readme = "README.md"
requires-python = ">=3.13"
license = { text = "MIT" }
authors = [{ name = "Gergely Wootsch", email = "hello@gergely-wootsch.com" }]
dependencies = [
    "sentence-transformers>=5.0",
    "torch>=2.4",
    "transformers>=4.51",
    "qdrant-client>=1.16.0",
    "pydantic>=2.12.5",
    "rich>=14.3.2",
    "vaultspec-core>=0.1.0",
    "mcp>=1.26.0",
    "typer>=0.12.0",
    "click>=8.1.7",
    "python-dotenv>=1.0.0",
    "tree-sitter>=0.23",
    "tree-sitter-language-pack>=0.10",
    "pathspec>=0.12",
    "watchfiles>=1.0.0",
]

[project.scripts]
vaultspec-rag = "vaultspec_rag.cli:app"
vaultspec-search-mcp = "vaultspec_rag.mcp_server:main"

[project.optional-dependencies]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-timeout>=2.4.0",
    "pytest-reportlog>=0.4.0",
    "pytest-durations>=1.0.0",
    "ruff>=0.15.2",
    "ty>=0.0.15",
    "pip-audit>=2.9.0",
    "prek>=0.3.2",
    "identify>=2.0.0",
    "mdformat>=1.0.0",
    "mdformat-frontmatter>=2.0.10",
    "mdformat-gfm>=1.0.0",
    "pymarkdownlnt>=0.9.0",
]

[dependency-groups]
dev = [
    "identify>=2.0.0",
    "mdformat>=1.0.0",
    "mdformat-frontmatter>=2.0.10",
    "mdformat-gfm>=1.0.0",
    "pip-audit>=2.9.0",
    "prek>=0.3.2",
    "pymarkdownlnt>=0.9.0",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-durations>=1.0.0",
    "pytest-reportlog>=0.4.0",
    "pytest-timeout>=2.4.0",
    "ruff>=0.15.2",
    "ty>=0.0.15",
]

[tool.uv.sources]
torch = [
    { index = "pytorch-cu130", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]
vaultspec-core = { path = "../../vaultspec-core-worktrees/main", editable = true }

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[tool.hatch.build.targets.wheel]
packages = ["src/vaultspec_rag"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
log_cli = true
log_cli_date_format = "%H:%M:%S"
log_cli_format = "%(asctime)s [%(levelname)8s] %(name)s: %(message)s"
log_cli_level = "INFO"
log_file = "test-debug.log"
log_file_level = "DEBUG"
markers = [
    "unit: fast tests with no external dependencies",
    "integration: requires CLI tools and network",
    "performance: benchmarking tests for throughput and latency",
    "quality: precision/recall and document coverage tests",
    "robustness: edge case and error handling tests",
    "timeout: timeout in seconds for individual tests",
]
testpaths = ["src/vaultspec_rag/tests"]
timeout = 300
timeout_func_only = true

[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "ARG", # flake8-unused-arguments
    "SIM", # flake8-simplify
    "TCH", # flake8-type-checking
    "RUF", # ruff-specific rules
    "N",   # pep8-naming
]
unfixable = ["B"]

[tool.ruff.lint.per-file-ignores]
"**/test_*.py" = ["ARG"]
"**/tests/**/*.py" = ["ARG"]

[tool.ruff.lint.isort]
known-first-party = ["vaultspec_rag"]

[tool.ty.environment]
python-version = "3.13"
root = [".", "src"]

